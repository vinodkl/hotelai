<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HotelAI — Learning Lab</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=JetBrains+Mono:wght@300;400&family=Outfit:wght@300;400;500&display=swap');

    :root {
      --gold: #c9a84c;
      --gold-light: #e8cc7a;
      --gold-dim: #8a6f2e;
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #1a1a24;
      --bg4: #22222f;
      --text: #e8e4dc;
      --text-dim: #8a8880;
      --text-muted: #4a4845;
      --green: #4caf7d;
      --blue: #4c8faf;
      --red: #af4c4c;
      --border: rgba(201, 168, 76, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 64px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--gold);
    }
    .logo span { color: var(--text-dim); font-size: 0.8rem; vertical-align: middle; margin-left: 0.5rem; }

    .status-bar {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      font-size: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }

    /* ── Layout ── */
    .app { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 1.5rem 0;
      overflow-y: auto;
    }

    .sidebar-section { margin-bottom: 2rem; }
    .sidebar-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 1.25rem;
      margin-bottom: 0.5rem;
    }

    .phase-btn {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem 1.25rem;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-dim);
      text-align: left;
      width: 100%;
      transition: all 0.2s;
      border-left: 2px solid transparent;
    }
    .phase-btn:hover { background: var(--bg3); color: var(--text); }
    .phase-btn.active {
      background: var(--bg3);
      border-left-color: var(--gold);
      color: var(--gold);
    }
    .phase-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      background: var(--bg4);
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      margin-top: 0.2rem;
      flex-shrink: 0;
    }
    .phase-info { display: flex; flex-direction: column; gap: 0.2rem; }
    .phase-name { font-size: 0.85rem; font-weight: 500; }
    .phase-desc { font-size: 0.7rem; color: var(--text-muted); line-height: 1.3; }

    .quick-btn {
      width: calc(100% - 2.5rem);
      margin: 0.2rem 1.25rem;
      padding: 0.5rem 0.75rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 0.75rem;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
    }
    .quick-btn:hover { border-color: var(--gold); color: var(--text); }

    /* ── Main chat area ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .phase-header {
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .phase-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--gold);
      letter-spacing: 0.05em;
    }
    .phase-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      border: 1px solid;
    }

    .messages { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1.25rem; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

    .msg { display: flex; gap: 1rem; max-width: 85%; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }

    .msg.user { margin-left: auto; flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; flex-shrink: 0; font-weight: 500;
    }
    .msg.user .msg-avatar { background: var(--bg4); color: var(--gold); border: 1px solid var(--border); }
    .msg.ai .msg-avatar { background: linear-gradient(135deg, var(--gold-dim), var(--gold)); color: var(--bg); }

    .msg-content { display: flex; flex-direction: column; gap: 0.5rem; }
    .msg-bubble {
      padding: 0.9rem 1.1rem;
      border-radius: 12px;
      font-size: 0.88rem;
      line-height: 1.6;
    }
    .msg.user .msg-bubble { background: var(--bg4); border: 1px solid var(--border); }
    .msg.ai .msg-bubble { background: var(--bg3); border: 1px solid var(--border); }

    /* Tool calls display */
    .tool-calls { display: flex; flex-direction: column; gap: 0.4rem; }
    .tool-call {
      background: var(--bg);
      border: 1px solid rgba(76, 143, 175, 0.3);
      border-radius: 8px;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
    }
    .tool-header {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 0.75rem;
      background: rgba(76, 143, 175, 0.1);
      color: var(--blue);
      cursor: pointer;
    }
    .tool-icon { font-size: 0.8rem; }
    .tool-body { padding: 0.5rem 0.75rem; color: var(--text-dim); display: none; white-space: pre-wrap; }
    .tool-body.open { display: block; }

    /* RAG chunks display */
    .rag-chunks { display: flex; flex-direction: column; gap: 0.3rem; }
    .rag-chunk {
      background: var(--bg);
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--gold-dim);
    }
    .rag-score {
      display: inline-block;
      background: rgba(201, 168, 76, 0.15);
      padding: 0.05rem 0.3rem;
      border-radius: 3px;
      margin-right: 0.4rem;
    }

    /* Input area */
    .input-area {
      padding: 1.25rem 2rem;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 0.88rem;
      font-weight: 300;
      resize: none;
      min-height: 48px;
      max-height: 140px;
      transition: border-color 0.2s;
      outline: none;
    }
    textarea:focus { border-color: var(--gold); }
    textarea::placeholder { color: var(--text-muted); }

    button.send {
      width: 48px; height: 48px;
      border-radius: 10px;
      background: var(--gold);
      border: none;
      color: var(--bg);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
      font-size: 1.1rem;
    }
    button.send:hover { background: var(--gold-light); transform: scale(1.03); }
    button.send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .ingest-btn {
      padding: 0.5rem 1rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .ingest-btn:hover { border-color: var(--gold); color: var(--gold); }

    .loading-dots { display: flex; gap: 4px; align-items: center; padding: 0.9rem 1.1rem; }
    .loading-dots span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--gold);
      animation: dot 1.4s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot { 0%,80%,100% { transform:scale(0.6); opacity:0.4 } 40% { transform:scale(1); opacity:1 } }

    .welcome {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex: 1; gap: 1rem; text-align: center; padding: 2rem;
    }
    .welcome-icon { font-size: 3rem; opacity: 0.4; }
    .welcome h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem; font-weight: 300; color: var(--gold); letter-spacing: 0.05em;
    }
    .welcome p { color: var(--text-muted); font-size: 0.88rem; max-width: 360px; line-height: 1.6; }
  </style>
</head>
<body>

<header>
  <div class="logo">THE GRAND HOTELAI <span>Learning Lab</span></div>
  <div class="status-bar">
    <div class="status-dot"></div>
    <span id="endpoint-label">localhost:3001</span>
    <span style="color: var(--text-muted)">|</span>
    <span id="phase-label" style="color: var(--gold)">Phase 1</span>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Learning Phases</div>

      <button class="phase-btn active" data-phase="chat" onclick="setPhase('chat', this)">
        <span class="phase-num">01</span>
        <div class="phase-info">
          <div class="phase-name">Basic LLM</div>
          <div class="phase-desc">Raw API call, no context. Watch it hallucinate hotel policies.</div>
        </div>
      </button>

      <button class="phase-btn" data-phase="rag" onclick="setPhase('rag', this)">
        <span class="phase-num">02</span>
        <div class="phase-info">
          <div class="phase-name">RAG Chat</div>
          <div class="phase-desc">LLM + retrieval from hotel knowledge base. See source chunks.</div>
        </div>
      </button>

      <button class="phase-btn" data-phase="agent" onclick="setPhase('agent', this)">
        <span class="phase-num">03</span>
        <div class="phase-info">
          <div class="phase-name">AI Agent</div>
          <div class="phase-desc">Multi-step ReAct loop. Book rooms, check availability, cancel.</div>
        </div>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Try These Prompts</div>
      <div id="quick-prompts"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Actions</div>
      <button class="quick-btn" onclick="ingestDocs()">📚 Ingest Hotel Docs (RAG)</button>
      <button class="quick-btn" onclick="clearChat()">🗑 Clear Chat</button>
      <button class="quick-btn" onclick="window.open('http://localhost:3001/api/ai/finetune/dataset')">📄 View Fine-tune Dataset</button>
    </div>
  </aside>

  <main class="main">
    <div class="phase-header">
      <span class="phase-title" id="main-phase-title">Phase 1 — Basic LLM Chat</span>
      <span class="phase-badge" id="main-phase-badge" style="border-color: var(--text-muted); color: var(--text-muted)">POST /api/ai/chat</span>
    </div>

    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-icon">🏨</div>
        <h2>Start Learning</h2>
        <p>Select a phase on the left, then ask a question. Compare how each phase responds differently to the same query.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Ask anything about the hotel..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send" id="send-btn" onclick="sendMessage()">↑</button>
      </div>
    </div>
  </main>
</div>

<script>
  const API = 'http://localhost:3001/api/ai';
  let currentPhase = 'chat';
  let chatHistory = [];
  let toolsOpen = {};

  const phases = {
    chat: {
      title: 'Phase 1 — Basic LLM Chat',
      endpoint: 'POST /api/ai/chat',
      color: 'var(--text-muted)',
      prompts: [
        'What are your cancellation policies?',
        'What time is check-in?',
        'Do you have a pool?',
        'Tell me about your loyalty program',
      ]
    },
    rag: {
      title: 'Phase 2 — RAG Chat',
      endpoint: 'POST /api/ai/rag',
      color: 'var(--gold)',
      prompts: [
        'What is your cancellation policy?',
        'What are the pet rules?',
        'What comes with Gold loyalty status?',
        'How much is valet parking?',
        'What dietary options does the restaurant offer?',
      ]
    },
    agent: {
      title: 'Phase 3 — AI Agent + Tool Use',
      endpoint: 'POST /api/ai/agent',
      color: 'var(--blue)',
      prompts: [
        'What suites are available Feb 25-28?',
        'Get me details on reservation RES001',
        'Show me the hotel occupancy stats',
        'Book room R201 for guest G002 from Feb 22 to Feb 25',
        'What would it cost for guest G003 to stay in R401 for 3 nights from Mar 1?',
      ]
    }
  };

  function setPhase(phase, btn) {
    currentPhase = phase;
    chatHistory = [];
    document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const p = phases[phase];
    document.getElementById('main-phase-title').textContent = p.title;
    document.getElementById('main-phase-badge').textContent = p.endpoint;
    document.getElementById('main-phase-badge').style.borderColor = p.color;
    document.getElementById('main-phase-badge').style.color = p.color;
    document.getElementById('phase-label').textContent = `Phase ${phase === 'chat' ? '1' : phase === 'rag' ? '2' : '3'}`;

    // Update prompts
    const container = document.getElementById('quick-prompts');
    container.innerHTML = p.prompts.map(pr =>
      `<button class="quick-btn" onclick="fillPrompt(this.textContent)">${pr}</button>`
    ).join('');

    clearChat(false);
  }

  function fillPrompt(text) {
    document.getElementById('input').value = text;
    document.getElementById('input').focus();
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const message = input.value.trim();
    if (!message) return;

    input.value = '';
    input.style.height = '';
    document.getElementById('send-btn').disabled = true;

    removeWelcome();
    appendMessage('user', message);
    const loadingId = appendLoading();

    chatHistory.push({ role: 'user', content: message });

    try {
      const res = await fetch(`${API}/${currentPhase}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, history: chatHistory.slice(0, -1) })
      });
      const data = await res.json();

      removeLoading(loadingId);

      if (data.error) {
        appendMessage('ai', `❌ Error: ${data.error}`);
      } else {
        chatHistory.push({ role: 'assistant', content: data.response });
        appendAIMessage(data);
      }
    } catch (err) {
      removeLoading(loadingId);
      appendMessage('ai', `❌ Could not connect to backend. Make sure it's running on port 3001.\n\n\`npm run dev\``);
    }

    document.getElementById('send-btn').disabled = false;
  }

  function appendMessage(role, text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="msg-avatar">${role === 'user' ? 'V' : '✦'}</div>
      <div class="msg-content">
        <div class="msg-bubble">${escapeHtml(text).replace(/\n/g, '<br>').replace(/`([^`]+)`/g, '<code style="background:var(--bg4);padding:0.1rem 0.3rem;border-radius:3px;font-family:monospace;font-size:0.85em">$1</code>')}</div>
      </div>`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function appendAIMessage(data) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ai';

    let extras = '';

    // Show retrieved chunks for RAG phase
    if (data.retrievedChunks && data.retrievedChunks.length > 0) {
      extras += `<div class="rag-chunks">
        <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:0.3rem;font-family:monospace">📚 Retrieved ${data.retrievedChunks.length} chunks:</div>
        ${data.retrievedChunks.map(c => `
          <div class="rag-chunk">
            <span class="rag-score">${c.score.toFixed(2)}</span>
            <strong>${c.title}</strong> — ${escapeHtml(c.snippet)}
          </div>`).join('')}
      </div>`;
    }

    // Show tool calls for agent phase
    if (data.toolCalls && data.toolCalls.length > 0) {
      const id = Date.now();
      extras += `<div class="tool-calls">
        <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:0.3rem;font-family:monospace">🔧 ${data.toolCalls.length} tool call(s) · ${data.iterations} iteration(s)</div>
        ${data.toolCalls.map((tc, i) => `
          <div class="tool-call">
            <div class="tool-header" onclick="toggleTool('${id}-${i}')">
              <span class="tool-icon">⚙</span>
              <span>${tc.name}</span>
              <span style="margin-left:auto;opacity:0.5">▾ click to expand</span>
            </div>
            <div class="tool-body" id="tool-${id}-${i}">
INPUT:  ${JSON.stringify(tc.input, null, 2)}

OUTPUT: ${JSON.stringify(tc.output, null, 2)}</div>
          </div>`).join('')}
      </div>`;
    }

    div.innerHTML = `
      <div class="msg-avatar">✦</div>
      <div class="msg-content">
        ${extras}
        <div class="msg-bubble">${formatResponse(data.response)}</div>
        ${data.note ? `<div style="font-size:0.7rem;color:var(--text-muted);font-family:monospace;padding:0.2rem 0.3rem">${data.note}</div>` : ''}
      </div>`;

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function toggleTool(id) {
    const el = document.getElementById(`tool-${id}`);
    el.classList.toggle('open');
  }

  function appendLoading() {
    const messages = document.getElementById('messages');
    const id = 'loading-' + Date.now();
    const div = document.createElement('div');
    div.id = id;
    div.className = 'msg ai';
    div.innerHTML = `
      <div class="msg-avatar">✦</div>
      <div class="msg-content">
        <div class="msg-bubble loading-dots"><span></span><span></span><span></span></div>
      </div>`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return id;
  }

  function removeLoading(id) { document.getElementById(id)?.remove(); }
  function removeWelcome() { document.querySelector('.welcome')?.remove(); }
  function clearChat(resetHistory = true) {
    document.getElementById('messages').innerHTML = '<div class="welcome"><div class="welcome-icon">🏨</div><h2>Start Learning</h2><p>Select a phase and ask a question. Compare how each phase responds differently.</p></div>';
    if (resetHistory) chatHistory = [];
  }

  async function ingestDocs() {
    removeWelcome();
    const loadingId = appendLoading();
    try {
      const res = await fetch(`${API}/ingest`, { method: 'POST' });
      const data = await res.json();
      removeLoading(loadingId);
      appendMessage('ai', `✅ Ingested ${data.chunksIndexed} chunks from hotel documents.\n\nNow switch to Phase 2 (RAG Chat) and ask about policies!`);
    } catch {
      removeLoading(loadingId);
      appendMessage('ai', '❌ Backend not running. Start it first with: cd backend && npm run dev');
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function escapeHtml(s) {
    return s?.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') || '';
  }

  function formatResponse(text) {
    return escapeHtml(text)
      .replace(/\n/g, '<br>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code style="background:var(--bg4);padding:0.1rem 0.3rem;border-radius:3px;font-family:monospace;font-size:0.85em">$1</code>');
  }

  // Init
  setPhase('chat', document.querySelector('.phase-btn'));
</script>

</body>
</html>
